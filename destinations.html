<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Destinations — Voyara</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="destinations_page.css">
<script src="js/api.js"></script>
<script src="js/auth.js"></script>

</head>
<body>
<nav class="navbar">
  <div class="container">
    <a href="index.html" class="navbar-brand">Voy<span>ara</span></a>
    <nav class="navbar-nav">
      <a href="destinations.html" class="active">Destinations</a>
      <a href="packages.html">Packages</a>
      <a href="search.html">Search</a>
      <a href="blog.html">Blog</a>
      <a href="about.html">About</a>
    </nav>
    <div class="navbar-actions"></div><!-- populated by auth.js -->
  </div>
</nav>

<section class="hero-dest">
  <div class="container">
    <div class="hero-dest-inner">
      <div>
        <div class="section-label">Explore the world</div>
        <h1>Find your perfect destination</h1>
        <p class="lead">From sun-kissed beaches to snow-capped peaks — discover places that stay with you forever.</p>
        <a href="search.html" class="btn btn-primary btn-lg">Start searching</a>
      </div>
      <div class="hero-dest-img">
        <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=700&q=80" alt="Beach destination">
      </div>
    </div>
  </div>
</section>


<div class="filter-wrapper">
  <div class="container">
    <div class="filter-bar">
      <span class="filter-label">Filter:</span>
      <span class="tag active" onclick="filterDest('all',this)">All</span>
      <span class="tag" onclick="filterDest('national',this)">National</span>
      <span class="tag" onclick="filterDest('international',this)">International</span>
      <span class="tag" onclick="filterDest('beach',this)">Beach</span>
      <span class="tag" onclick="filterDest('mountain',this)">Mountain</span>
      <span class="tag" onclick="filterDest('city',this)">City</span>
      <span class="tag" onclick="filterDest('nature',this)">Nature</span>
      <span class="tag" onclick="filterDest('heritage',this)">Heritage</span>
      <div style="margin-left:auto;display:flex;align-items:center;gap:12px">
        <label style="font-size:13px;font-weight:600;white-space:nowrap;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Sort by</label>
        <select class="form-control" id="destSort" style="width:auto;padding:8px 16px;border-radius:100px;background:var(--off)" onchange="applyDestFilters()">
          <option value="popular">Popular</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating">Highest Rated</option>
        </select>
      </div>
    </div>
  </div>
</div>

<div class="container">
<!-- destinations.js handles dynamic loading -->
<script src="js/destinations.js"></script>
</body>
</html>
